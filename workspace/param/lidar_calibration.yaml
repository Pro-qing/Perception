# workspace/param/lidar_calibration.yaml
parent_frame: "velodyne" 

# 话题名称配置
topics:
  main: "/points_16"
  mid: "/points_mid"
  left: "/scan_left"
  right: "/scan_right"
  output: "/points_raw"
  waypoint: "/lqr_targetwayp"

calibration:
  main:  {x: 0.986, y: -0.01, z: 1.8, roll: 0.0, pitch: 0.0, yaw: -0.03}
  mid:   {x: 0.183, y: -0.004, z: -0.36, roll: -0.027, pitch: 2.9534, yaw: 3.098}
  left:  {x: 0.22, y: 0.33, z: -1.8, roll: 3.1415926, pitch: 0.0, yaw: -2.08}
  right: {x: 0.21, y: -0.36, z: -1.8, roll: 3.1415926, pitch: 0.0, yaw: 2.17}

# 行为模式配置 (key 对应 Waypoint.lane_id 的行为 ID)
# 默认行为 ID（未匹配到特定模式时使用）
default_behavior: &default_behavior
  main: true
  mid: true
  left: true
  right: true

behaviors:
  "0": *default_behavior
  "1": *default_behavior
  "2": *default_behavior
  "3":   # 电梯模式
    main: true
    mid: true
    left: false
    right: false
  "4":   # 坡道模式
    main: true
    mid: true
    left: false
    right: false