# workspace/param/downsample.yaml

# 输入话题 (来自 lidar_sensor_input 发布的合并点云)
input_topic: "/points_raw"

# 输出话题 (降采样后的点云)
output_topic: "/points_downsampled"

# VoxelGrid 体素滤波参数
voxel_grid:
  # 体素大小 (米) - 值越大降采样越激进，点云越稀疏
  leaf_size_x: 0.1
  leaf_size_y: 0.1
  leaf_size_z: 0.1

  # 每个体素中保留的最小点数 (低于此值的体素将被丢弃)
  min_points_per_voxel: 1

  # 是否对所有字段 (强度、颜色等) 进行降采样，而非仅 XYZ
  # true: 所有字段都会被降采样
  # false: 仅对 XYZ 坐标降采样
  downsample_all_data: true

# 车身过滤 (Body Filter) - 使用多边形点位精确描述车身轮廓
# 通过点到多边形 (Point-in-Polygon) 算法判断点是否在车身内部
# Z 范围使用简单的 min/max 高度裁剪
# 如果不需要车身过滤，请将 enable 设为 false
body_filter:
  enable: true
  # 车身高度范围 (单位: 米)
  min_z: 0.0
  max_z: 2.0
  # 车身轮廓多边形顶点 (X: 前后, Y: 左右, 单位: 米)
  # 从车头开始，顺时针或逆时针依次列出各顶点
  # 坐标系: base_link, X正方向为车辆前方, Y正方向为车辆左方
  polygon:
    # 车身轮廓 (以矩形为例，可替换为任意多边形)
    - {x:  1.5, y: -0.8}   # 右前方
    - {x:  1.5, y:  0.8}   # 左前方
    - {x: -1.5, y:  0.8}   # 左后方
    - {x: -1.5, y: -0.8}   # 右后方

  # 是否发布车身 Marker 可视化
  publish_marker: true
  marker_topic: "/car"
  marker_color_r: 0.0
  marker_color_g: 1.0
  marker_color_b: 0.0
  marker_color_a: 0.5

# 裁剪框 (CropBox) 参数 - 在降采样前裁剪点云范围
# 如果不需要裁剪，请将 enable 设为 false
crop_box:
  enable: true
  # 裁剪范围 (相对于 base_link, 单位: 米)
  min_x: -2.0
  max_x: 7.0
  min_y: -3.0
  max_y: 3.0
  min_z: -2.0
  max_z: 0.0

  # 是否反转裁剪 (true: 保留框外的点, false: 保留框内的点)
  negative: false

# 高度过滤参数 - 基于 z 轴过滤点云
# 如果不需要高度过滤，请将 enable 设为 false
height_filter:
  enable: false
  # 保留的高度范围 (单位: 米)
  min_height: -2.0
  max_height: 2.0