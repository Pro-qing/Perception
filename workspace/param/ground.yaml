# workspace/param/ground.yaml
# PCL RANSAC Ground Plane Segmentation 参数配置

# ---- 话题配置 ----
# 输入话题 (来自 lidar_downsample 的降采样点云)
input_topic: "/points_downsampled"

# 输出话题
no_ground_topic: "/lidar_no_ground"    # 去除地面后的障碍物点云
ground_topic: "/lidar_ground"          # 纯地面点云

# ---- RANSAC 参数 ----
ransac:
  # RANSAC 最大迭代次数
  # 值越大拟合越准确, 但计算量增加
  # 典型值: 50 ~ 500
  max_iterations: 100

  # 点到拟合平面的最大距离 (单位: 米)
  # 距离小于此值的点被认为是地面内点 (inlier)
  # 值越小越严格 (只有非常平整的地面才会被识别), 值越大越宽松
  # 这是 RANSAC 最关键的参数, 需要根据实际地面情况调整
  # 典型值: 0.05 ~ 0.3
  distance_threshold: 0.1

  # RANSAC 成功概率
  # 值越接近 1, 需要的迭代次数越多, 但拟合更可靠
  probability: 0.99

  # 平面法向量与 Z 轴的最大夹角 (单位: 度)
  # 仅在 use_perpendicular=true 时生效
  # 地面法向量应该接近 Z 轴方向, 所以此角度通常很小
  # 典型值: 5.0 ~ 20.0 度
  eps_angle: 10.0

  # 是否优化模型系数
  # true: 对找到的内点重新拟合以获得更精确的系数
  optimize_coefficients: true

  # 是否使用垂直平面模型
  # true:  SACMODEL_PERPENDICULAR_PLANE - 地面必须垂直于 Z 轴 (推荐)
  # false: SACMODEL_PLANE - 普通平面, 不约束方向
  use_perpendicular: true

# ---- 地面约束参数 ----
# 对 RANSAC 内点的高度进行额外约束
ground:
  # 地面点的最大 Z 值 (米)
  # 高于此值的内点不认为是地面 (防止斜坡上的点被误判)
  max_height: 0.5

  # 地面点的最小 Z 值 (米)
  # 低于此值的内点不认为是地面
  min_height: -2.0

# ---- 迭代拟合参数 (可选) ----
# 启用后会多次执行 RANSAC, 每次移除已找到的地面点后继续拟合
# 适用于有多个高度层次的地面 (如坡道、台阶等)
iterative:
  enable: false
  max_iterations: 3           # 最大迭代次数
  height_threshold: 0.05      # 点到平面距离小于此值则移除 (米)

# ---- 预过滤参数 (可选) ----
# 在地面过滤前先进行简单的高度裁剪, 去除明显不在地面范围内的点
pre_filter:
  enable: true
  min_z: -2.0    # 最低高度 (米)
  max_z: 0.5     # 最高高度 (米)